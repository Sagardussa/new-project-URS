<div class="relative w-full min-w-0 intl-phone-input">
  <div class="flex w-full min-w-0">
    <!-- Country Dropdown -->
    <div class="relative flex-shrink-0">
      <button
        type="button"
        (click)="toggleDropdown()"
        class="flex items-center px-1 py-2.5 border border-r-0 border-gray-300 bg-white rounded-l-md focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-200 hover:bg-gray-50"
        [class.border-red-300]="isInvalid()"
        [class.detecting-country]="detectingCountry()"
      >
        <img
          [src]="getFlagImageUrl(selectedCountry().flag)"
          [alt]="selectedCountry().name + ' flag'"
          class="w-5 h-3 mr-2 rounded-sm object-cover border border-gray-200"
          onerror="this.style.display='none'"
        />
        <span class="text-sm font-medium text-gray-700 mr-1">{{
          selectedCountry().dialCode
        }}</span>
        <svg
          class="w-4 h-4 ml-auto text-gray-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          ></path>
        </svg>
      </button>

      <!-- Dropdown Menu -->
      <div *ngIf="isDropdownOpen()" [class]="getDropdownClasses()" #dropdown>
        <!-- Search Input -->
        <div class="sticky top-0 z-10 p-2 border-b border-gray-200 bg-white">
          <input
            type="text"
            placeholder="Search countries..."
            [value]="searchTerm()"
            (input)="onSearchChange($event)"
            class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200 placeholder-gray-500"
          />
        </div>

        <!-- Country List -->
        <div class="countries-scroll-area py-1">
          <!-- Preferred Countries Section -->
          <div *ngIf="filteredCountries().preferred.length > 0">
            <div
              class="px-3 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wide border-b border-gray-100 bg-gray-50"
            >
              Preferred
            </div>
            <button
              *ngFor="let country of filteredCountries().preferred"
              type="button"
              (click)="selectCountry(country)"
              class="flex items-center w-full px-3 py-2 text-left hover:bg-blue-50 focus:outline-none focus:bg-blue-50 transition-colors duration-150 border-l-2 border-blue-400"
            >
              <img
                [src]="getFlagImageUrl(country.flag)"
                [alt]="country.name + ' flag'"
                class="w-5 h-3 mr-3 rounded-sm object-cover border border-gray-200"
                onerror="this.style.display='none'"
              />
              <div class="flex-1">
                <div class="text-sm font-medium text-gray-900">
                  {{ country.name }}
                </div>
                <div class="text-xs text-blue-600 font-medium">
                  {{ country.dialCode }}
                </div>
              </div>
            </button>

            <!-- Divider between preferred and other countries -->
            <div
              *ngIf="filteredCountries().others.length > 0"
              class="border-t border-gray-200 my-1"
            ></div>
          </div>

          <!-- Other Countries Section -->
          <div *ngIf="filteredCountries().others.length > 0">
            <div
              *ngIf="filteredCountries().preferred.length > 0"
              class="px-3 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wide bg-gray-50"
            >
              All Countries
            </div>
            <button
              *ngFor="let country of filteredCountries().others"
              type="button"
              (click)="selectCountry(country)"
              class="flex items-center w-full px-3 py-2 text-left hover:bg-gray-100 focus:outline-none focus:bg-gray-100 transition-colors duration-150"
            >
              <img
                [src]="getFlagImageUrl(country.flag)"
                [alt]="country.name + ' flag'"
                class="w-5 h-3 mr-3 rounded-sm object-cover border border-gray-200"
                onerror="this.style.display='none'"
              />
              <div class="flex-1">
                <div class="text-sm font-medium text-gray-900">
                  {{ country.name }}
                </div>
                <div class="text-xs text-gray-500">{{ country.dialCode }}</div>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Phone Number Input -->
    <input
      type="tel"
      [value]="formattedPhoneNumber()"
      (input)="onPhoneNumberChange($event)"
      (keypress)="onPhoneKeyPress($event)"
      (keydown)="onPhoneKeyDown($event)"
      (paste)="onPhonePaste($event)"
      (blur)="onBlur()"
      [placeholder]="phonePlaceholder()"
      [maxLength]="selectedCountry().maxLength || 15"
      class="flex-1 min-w-0 w-full px-3 py-2.5 border border-gray-300 rounded-r-md focus:outline-none focus:ring-1 focus:ring-blue-200 focus:border-blue-200 text-sm"
      [class.border-red-300]="isInvalid()"
    />
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage()" class="mt-1 text-xs text-red-500 font-medium">
    {{ errorMessage() }}
  </div>

  <!-- Formatted Display -->
  <div
    *ngIf="formattedFullNumber() && !errorMessage()"
    class="mt-1 text-xs text-gray-500"
  >
    Full number: {{ formattedFullNumber() }}
  </div>
</div>

<!-- Backdrop -->
<div
  *ngIf="isDropdownOpen()"
  (click)="closeDropdown()"
  class="fixed inset-0 z-40"
></div>
