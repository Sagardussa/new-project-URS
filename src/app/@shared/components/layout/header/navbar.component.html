<nav
  *ngIf="showNavbar"
  class="bg-NavbarGradientColor fixed w-full top-0 z-20 mb-40"
  [ngClass]="navbarClass"
>
  <div class="mx-auto px-2 sm:px-6 lg:px-8 2xl:px-0">
    <div
      class="relative flex h-16 items-center justify-between lg:px-[5px] 2xl:px-[35px]"
    >
      <div class="absolute inset-y-0 flex items-center lg:hidden">
        <!-- Mobile menu button-->
        <button
          type="button"
          (click)="toggleSidebar()"
          class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg lg:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
          aria-controls="sidebar-menu"
          aria-expanded="false"
        >
          <span class="sr-only">Open sidebar</span>
          <svg
            class="w-6 h-6"
            aria-hidden="true"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              clip-rule="evenodd"
              fill-rule="evenodd"
              d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"
            ></path>
          </svg>
        </button>
      </div>
      <div
        class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start"
      >
        <a class="sm:ml-12 lg:ml-0 flex items-center" routerLink="/dashboard">
          <img
            loading="lazy"
            class="h-6 w-auto logo"
            src="assets\logo-circle.svg"
            alt="Your Company"
          />
          <span class="ml-1 font-semibold text-white">Admin Referral</span>
        </a>
      </div>

      <!-- User dropdown -->
      <div
        class="relative ml-2 sm:ml-3"
        (mouseenter)="showUserDropdown()"
        (mouseleave)="hideUserDropdown()"
      >
        <div>
          <button
            type="button"
            class="relative flex items-center justify-center gap-1.5 sm:justify-start rounded-full sm:w-auto bg-[rgba(255,255,255,0.08)] px-1.5 py-1.5 sm:px-2 sm:py-1.5 text-gray-400 hover:text-white focus:outline-none focus:ring-white focus:ring-offset-gray-800"
            id="user-menu-button"
            aria-expanded="false"
            aria-haspopup="true"
            (click)="openUserDropdown()"
            [attr.aria-label]="getUserDisplayName()"
          >
            <img
              loading="lazy"
              class="h-6 w-6 rounded-full flex-shrink-0"
              src="assets/dashboard/user.svg"
              alt="User"
            />
            <span
              class="hidden sm:block text-sm font-medium whitespace-nowrap"
              >{{ getUserDisplayName() }}</span
            >
          </button>
        </div>
        <div
          *ngIf="isNavUserDropdown"
          class="absolute right-0 z-10 mt-2 w-52 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none user-dropdown"
          [ngClass]="userDropdownAnimationClass"
          role="menu"
          aria-orientation="vertical"
          aria-labelledby="user-menu-button"
          tabindex="-1"
          appClickOutside
          (appClickOutside)="isNavUserDropdown = false"
        >
          <a
            (click)="navigateToSettings()"
            class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 cursor-pointer hover:bg-gray-100"
            role="menuitem"
            tabindex="-1"
            id="user-menu-item-settings"
          >
            <svg
              class="h-5 w-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
            Settings</a
          >
          <a
            (click)="signout()"
            class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 cursor-pointer hover:bg-gray-100"
            role="menuitem"
            tabindex="-1"
            id="user-menu-item-4"
          >
            <img
              src="assets/box-arrow-right.svg"
              alt="Sign Out"
              class="h-5 w-5"
            />Sign Out</a
          >
        </div>
      </div>
    </div>
  </div>

  <!-- Backdrop Overlay -->
  <button
    *ngIf="isSidebarOpen"
    type="button"
    (click)="closeSidebar()"
    (keydown)="onBackdropKeyDown($event)"
    aria-label="Close sidebar"
    class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden sidebar-backdrop border-0 p-0 cursor-pointer"
  ></button>

  <!-- Left Side Sliding Sidebar (visible only on mobile/iPad) -->
  <aside
    id="sidebar-menu"
    [ngClass]="{
      'translate-x-0': isSidebarOpen,
      '-translate-x-full': !isSidebarOpen,
    }"
    class="fixed top-0 left-0 z-50 w-64 h-screen transition-transform lg:hidden sidebar-menu"
    aria-label="Sidebar"
  >
    <div class="h-full px-3 py-4 overflow-y-auto bg-NavbarGradientColor">
      <!-- Close Button -->
      <div
        class="flex justify-between items-center mb-4 pb-3 border-b border-[rgba(255,255,255,0.2)]"
      >
        <h3 class="text-lg font-semibold text-white">Menu</h3>
        <button
          type="button"
          (click)="closeSidebar()"
          class="text-[rgba(255,255,255,0.7)] hover:text-white rounded-lg text-sm p-1.5 transition-colors"
        >
          <svg
            class="w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
              clip-rule="evenodd"
            ></path>
          </svg>
        </button>
      </div>

      <!-- Sidebar Menu Items -->
      <ul class="space-y-2 font-medium">
        <li>
          <a
            routerLink="/dashboard"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-5 h-5 transition duration-75"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z"
              />
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z"
              />
            </svg>
            <span class="ms-3">Dashboard</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/events"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-5 h-5 transition duration-75"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"
              />
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m9 12 2 2 4-4"
              />
            </svg>
            <span class="ms-3">Events</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/programs"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-5 h-5 transition duration-75"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v13m0-13V6a2 2 0 1 1 2 2v3m0 0V6a2 2 0 1 1 2 2v5m0 0V6a2 2 0 1 1 2 2v8M5 8h14a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"
              />
            </svg>
            <span class="ms-3">Programs</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/referral"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-5 h-5 transition duration-75"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 8H5m12 0a1 1 0 0 1 1 1v2.6M17 8l-4-4M5 8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.6M5 8l4-4 4 4m6 4h-4a2 2 0 1 0 0 4h4a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1Z"
              />
            </svg>
            <span class="ms-3">Referral</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/referral-codes"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg class="w-5 h-5 transition duration-75" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.5 9.5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z"/>
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.5 14.5a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1Z"/>
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m14.5 9.5-6 5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
            </svg>
            <span class="ms-3">Referral Codes</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/rewards"
            (click)="closeSidebar()"
            routerLinkActive="sidebar-active"
            class="flex items-center px-3 py-2.5 text-[rgba(255,255,255,0.8)] rounded-lg hover:bg-[rgba(255,255,255,0.1)] hover:text-white transition-all duration-200"
          >
            <svg class="w-5 h-5 transition duration-75 flex-shrink-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="ms-3">Rewards</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <!-- Desktop Menubar (hidden on mobile/iPad) -->
  <app-menubar></app-menubar>
</nav>
