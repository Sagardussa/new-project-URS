<div class="autosuggest-container relative">
  <div class="relative">
    <input
      #inputElement
      type="text"
      [value]="inputValue()"
      [placeholder]="placeholder"
      [disabled]="disabled"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      class="block w-full p-2 bg-white text-[13px] lg:text-[14px] border border-[#19253766] rounded-[5px] shadow-sm focus:outline-none focus:ring-2 focus:ring-[#192537] focus:border-[#192537] placeholder-[#9ca3af] font-medium pr-8"
    />
    <button
      *ngIf="inputValue() && !disabled"
      type="button"
      (click)="clearValue()"
      class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
      tabindex="-1"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <div
      *ngIf="loading"
      class="absolute right-2 top-1/2 -translate-y-1/2"
    >
      <svg class="animate-spin h-4 w-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>
  </div>

  <!-- Dropdown -->
  <div
    *ngIf="showDropdown() && (filteredSuggestions.length > 0 || hasCustomValue)"
    class="absolute z-50 w-full mt-1 bg-white border border-[#19253766] rounded-[5px] shadow-lg max-h-60 overflow-auto"
  >
    <!-- Suggestions -->
    <ul class="py-1">
      <li
        *ngFor="let suggestion of filteredSuggestions; let i = index"
        (click)="selectSuggestion(suggestion)"
        [class.bg-[#192537]="selectedIndex() === i"
        [class.text-white]="selectedIndex() === i"
        class="px-3 py-2 cursor-pointer hover:bg-gray-100 text-[13px] lg:text-[14px]"
        [innerHTML]="highlightMatch(capitalizeRoleName(suggestion), inputValue())"
      ></li>
    </ul>

    <!-- Custom Value Option -->
    <div
      *ngIf="hasCustomValue && allowCustomValue"
      (click)="selectCustomValue()"
      [class.bg-[#192537]="selectedIndex() === filteredSuggestions.length"
      [class.text-white]="selectedIndex() === filteredSuggestions.length"
      class="px-3 py-2 cursor-pointer hover:bg-gray-100 text-[13px] lg:text-[14px] border-t border-gray-200"
    >
      <span class="font-medium">Press Enter to add:</span>
      <span class="ml-2">{{ capitalizeRoleName(inputValue()) }}</span>
    </div>
  </div>
</div>
