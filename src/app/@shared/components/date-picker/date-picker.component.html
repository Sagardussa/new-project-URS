<div class="relative" #datepickerRef>
	<!-- Input Field -->
	<div class="relative w-full sm:w-auto">
		<div
			class="absolute inset-y-0 start-0 flex items-center ps-2 pointer-events-none"
		>
			<svg
				class="w-4 h-4 text-gray-500"
				aria-hidden="true"
				xmlns="http://www.w3.org/2000/svg"
				fill="currentColor"
				viewBox="0 0 20 20"
			>
				<path
					d="M20 4a2 2 0 0 0-2-2h-2V1a1 1 0 0 0-2 0v1h-3V1a1 1 0 0 0-2 0v1H6V1a1 1 0 0 0-2 0v1H2a2 2 0 0 0-2 2v2h20V4ZM0 18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8H0v10Zm5-8h10a1 1 0 0 1 0 2H5a1 1 0 0 1 0-2Z"
				/>
			</svg>
		</div>
		<input
			[formControl]="dateRangeControl"
			readonly
			(click)="toggleDatepicker($event)"
			id="datepicker-range-start"
			name="start"
			type="text"
			class="bg-gray-50 border border-gray-300 w-full text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block  ps-10 p-2.5 input-style-main cursor-pointer"
			[placeholder]="placeHolder"
		/>
	</div>

	<!-- Datepicker Container -->
	<div
		*ngIf="isOpen"
		class="absolute mt-1 w-full sm:w-[325px] rounded-xl border border-gray-200 bg-white pt-2 shadow-lg datepicker-dropdown"
	>
		<!-- Header with Month/Year Selection -->
		<div class="flex items-center justify-between px-5">
			<button
				(click)="prevMonth($event)"
				[disabled]="isPrevDisabled()"
				class="rounded-md p-2 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
			>
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="size-6"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18"
					/>
				</svg>
			</button>

			<div class="flex space-x-2 items-center">
				<button
					(click)="toggleMonthSelect($event)"
					class="px-2 py-1 text-md font-medium text-gray-700 hover:bg-gray-100"
				>
					{{months[this.currentDate.getMonth()].month}}
				</button>
				<button
					(click)="toggleYearSelect($event)"
					class="px-2 py-1 text-md font-medium text-gray-700 hover:bg-gray-100"
				>
					{{ currentDate.getFullYear() }}
				</button>
			</div>

			<button
				(click)="nextMonth($event)"
				[disabled]="isNextDisabled()"
				class="rounded-md p-2 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
			>
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="size-6"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3"
					/>
				</svg>
			</button>
		</div>

		<!-- Month Select Dropdown -->
		<div
			*ngIf="showMonthSelect"
			(click)="$event.stopPropagation()"
			class="absolute left-1/2 top-16 z-10 -translate-x-1/2 transform rounded-lg border border-gray-200 bg-white p-2 shadow-lg w-full sm:w-[200px]"
		>
			<div class="grid grid-cols-3 gap-2">
				<button
					*ngFor="let month of abbreviatedMonths; let i = index"
					(click)="selectMonth($event, i)"
					class="px-2 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded"
				>
					{{ month }}
				</button>
			</div>
		</div>

		<!-- Year Select Dropdown -->
		<div
			*ngIf="showYearSelect"
			(click)="$event.stopPropagation();"
			class="absolute left-1/2 top-16 z-10 max-h-48 -translate-x-1/2 transform overflow-y-auto rounded-lg border border-gray-200 bg-white p-2 shadow-lg"
		>
			<div class="flex flex-col space-y-2">
				<button
					*ngFor="let year of years"
					(click)="selectYear($event, year)"
					class="px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
				>
					{{ year }}
				</button>
			</div>
		</div>

		<!-- Calendar Grid -->
		<div class="mb-3 mt-2 grid grid-cols-7">
			<div
				*ngFor="let day of weekDays"
				class="text-center text-sm font-medium text-gray-500"
			>
				{{ day.week }}
			</div>
		</div>

		<div class="mt-2 grid grid-cols-7 gap-y-0.5 px-5 pb-4">
			<div
				*ngFor="let day of calendarDays"
				[ngClass]="getDayClass(day)"
				(click)="!isDateDisabled(day) && selectDate(day)"
			>
				{{ day.getDate() }}
			</div>
		</div>

		<!-- Action Buttons -->
		<!-- <div
			class="mt-1 flex justify-end space-x-2.5 border-t border-gray-200 p-2"
		>
			<button
				(click)="cancel()"
				class="rounded-lg border border-blue-600 px-5 py-1.5 text-base font-medium text-blue-600 hover:bg-blue-50"
			>
				Cancel
			</button>
			<button
				(click)="apply()"
				class="rounded-lg bg-blue-600 px-5 py-1.5 text-base font-medium text-white hover:bg-blue-700"
			>
				Apply
			</button>
		</div> -->
	</div>
</div>
