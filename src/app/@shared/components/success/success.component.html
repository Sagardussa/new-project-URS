<div class="success-message fixed z-10 top-0 left-0 right-0 bottom-0 w-full h-full bg-white">
  <img *ngIf="imageUrl" [src]="imageUrl" alt="Success Image" class="mx-auto my-10">
  <h2 class="text-customBlack font-bold text-2xl text-center mb-2">{{ heading }}</h2>
  <p class="text-[#192537CC] font-medium text-base text-center">{{ paragraph }}</p>
</div>
