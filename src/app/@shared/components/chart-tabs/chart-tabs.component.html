<div class="flex justify-center items-center">
    <div class="flex flex-shrink-0 items-center gap-1 bg-gray-100 text-black p-1 rounded-full ">
      <button 
        *ngFor="let tab of tabs" 
        class="px-2 py-1 rounded-full transition duration-200 text-[10px]" 
        [ngClass]="{
          'bg-white text-black': activeTab === tab, 
          ' hover:bg-gray-50 text-black': activeTab !== tab 
        }" 
        (click)="selectTab(tab)">
       {{ tab }}
      </button>
    </div>
  </div>
