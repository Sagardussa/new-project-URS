  <select 
    class="input-style-main block w-full text-left rounded-full px-3 py-1.5 outline-none font-bold text-[10px] text-[#192537] bg-gray-100 appearance-none bg-no-repeat bg-right pr-8"
    style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2710%27 height=%2710%27 fill=%27currentColor%27 class=%27bi bi-chevron-down%27 viewBox=%270 0 16 16%27%3E%3Cpath fill-rule=%27evenodd%27 d=%27M1.646 5.646a.5.5 0 0 1 .708 0L8 11.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z%27/%3E%3C/svg%3E'); background-position: calc(100% - 0.6rem) center;" 
  >
    <option value="" disabled selected>{{ title }}</option> <!-- Placeholder option -->
    <option *ngFor="let item of items" [value]="item.link">
      <span>{{ item.label }}</span>
    </option>
  </select>
</div>
