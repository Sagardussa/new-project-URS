<div class="min-h-screen flex flex-col lg:flex-row font-sans">
  <!-- Left: Branding panel (hidden on small screens) -->
  <div class="hidden lg:flex lg:w-[48%] xl:w-[45%] bg-NavbarGradientColor relative overflow-hidden flex-shrink-0">
    <div class="absolute inset-0 opacity-10">
      <div class="absolute top-20 left-20 w-72 h-72 rounded-full border border-white/30"></div>
      <div class="absolute bottom-32 right-16 w-96 h-96 rounded-full border border-white/20"></div>
      <div class="absolute top-1/2 left-1/3 w-48 h-48 rounded-full border border-white/25"></div>
    </div>
    <div class="relative z-10 flex flex-col justify-center px-12 xl:px-20 py-16">
      <a routerLink="/dashboard" class="inline-flex items-center gap-3 mb-16">
        <img class="w-14 h-14" src="assets/logo-circle.svg" alt="Referral" />
        <span class="text-2xl font-semibold text-white tracking-tight">Referral</span>
      </a>
      <h1 class="text-4xl xl:text-5xl font-light text-white leading-tight mb-4">
        Welcome back
      </h1>
      <p class="text-lg text-white/80 max-w-md leading-relaxed">
        Sign in to your account to continue. Secure access to your referral dashboard.
      </p>
      <div class="mt-12 flex items-center gap-3 text-white/70 text-sm">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Secure sign in</span>
      </div>
      <div class="mt-2 flex items-center gap-3 text-white/70 text-sm">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Your data is protected</span>
      </div>
    </div>
  </div>

  <!-- Right: Login form -->
  <div class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-12 py-12 bg-gray-50/80">
    <div class="w-full max-w-md">
      <!-- Mobile logo -->
      <div class="lg:hidden text-center mb-8">
        <a routerLink="/dashboard" class="inline-flex items-center gap-2">
          <img class="w-12 h-12" src="assets/logo-circle.svg" alt="Referral" />
          <span class="text-xl font-semibold text-[#192537]">Referral</span>
        </a>
      </div>

      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/60 border border-gray-100/80 p-8 sm:p-10">
        <h2 class="text-2xl font-semibold text-[#192537] mb-1">Sign in</h2>
        <p class="text-sm text-gray-500 mb-6">Enter your credentials to access your account.</p>

        <app-dynamic-form
          [sectionFields]="loginFields"
          [columnsCount]="1"
          submitButtonText="Sign in"
          [showResetButton]="false"
          [initialData]="{ scope: 'ADMIN' }"
          (formSubmitted)="onFormSubmitted($event)"
        />

      </div>
    </div>
  </div>
</div>
