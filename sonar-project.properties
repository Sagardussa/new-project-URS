# ============================================
# SonarQube Project Configuration - Frontend
# ============================================

# Project Identification
sonar.projectKey=URS-frontend
sonar.projectName=URS-frontend

# SonarQube Server Configuration
sonar.host.url=http://172.16.2.13:9000
sonar.token=${SONAR_FRONTEND_TOKEN}

# Source Code Configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions - Source Files
sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/coverage/**,\
**/out-tsc/**,\
**/.scannerwork/**,\
**/.angular/**,\
**/*.spec.ts,\
**/*.test.ts,\
**/*.d.ts,\
**/*.config.js,\
**/karma.conf.js,\
**/Jenkinsfile,\
**/README.md,\
**/*.md




